name: Deploy demo to GitHub Pages

# เดโม่ฟรี 0 บาท — build static แล้ว push ขึ้น branch `gh-pages` ทุกครั้งที่ push main
# ใช้วิธี branch (ไม่พึ่ง Pages "enablement" API ที่ GITHUB_TOKEN สร้าง site ไม่ได้)
# → workflow ผ่านเขียวด้วย contents:write เท่านั้น
# ครั้งแรกให้ตั้ง Settings → Pages → Source = "Deploy from a branch" → gh-pages / root
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # ต้องเขียนได้เพื่อ push branch gh-pages

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (base = /<repo>/)
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      # ใช้ HashRouter → static ล้วน · .nojekyll กัน GitHub Pages ประมวลผล asset ผิด
      - name: Publish to gh-pages branch
        run: |
          cd dist
          touch .nojekyll
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "deploy ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
