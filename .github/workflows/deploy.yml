name: Deploy demo to GitHub Pages

# เดโม่ฟรี 0 บาท — build เป็น static แล้ว deploy อัตโนมัติทุกครั้งที่ push main
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# ให้ deploy ทีละครั้ง ไม่ชนกัน
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (base = /<repo>/)
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      # ใช้ HashRouter แล้ว → ไม่ต้องมี 404.html/SPA rewrite · static ล้วน

      - uses: actions/configure-pages@v5
        with:
          # เปิด GitHub Pages ให้อัตโนมัติ (ไม่ต้องตั้งใน Settings เอง)
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
